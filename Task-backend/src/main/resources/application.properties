# 1. Database Connection Settings
# Change 'labor_db' to your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/labor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate Properties
# 'update' will create tables if they don't exist and update them if you add fields to your Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. JWT Security Constants (Custom properties)
# Use a very long, complex string for the secret (at least 64 characters)
app.jwt.secret=4z7C9vB2n5m8x1A3p0Q9w8E7r6T5y4U3i2O1p0A9s8D7f6G5h4J3k2L1z0X9c8V7b6N5m4Q3W2E1R0T9Y8U7I6O5P4A3S2D1F0G9H8J7K6L5Z4X3C2V1B0N9M8
app.jwt.expiration-ms=86400000

# 4. Server Port
# Default is 8080, but you can change it if needed
server.port=8080

# 5. Logging
logging.level.org.springframework.security=INFO